name: npm audit fix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  npm-audit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ybiquitous/npm-audit-fix-action@7a4ed61745dec3422c6a0450e4948f0282b456f1 # v7.3.11
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
